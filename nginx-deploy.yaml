# Deploy 생성 (파드는 3개)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app-deploy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-app
  template:
    metadata:
      labels:
        app: nginx-app
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: nginx-app
        image: 185561783944.dkr.ecr.ap-northeast-2.amazonaws.com/eks-nginx:v1.0
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 200m
            memory: 256Mi
